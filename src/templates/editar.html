{% extends "base.html" %}
{% block title %}Editar Leitura #{{ leitura.id }}{% endblock %}

{% block content %}
<h1>Editar Leitura #{{ leitura.id }}</h1>

<form id="form-editar">
  <label>
    Temperatura (°C)
    <input type="number" step="0.01" name="temperatura" value="{{ leitura.temperatura }}" required>
  </label>
  <label>
    Umidade (%)
    <input type="number" step="0.01" name="umidade" value="{{ leitura.umidade }}" required>
  </label>
  <label>
    Pressão (hPa)
    <input type="number" step="0.01" name="pressao" value="{{ leitura.pressao if leitura.pressao is not none else '' }}">
  </label>
  <button type="submit">Salvar</button>
  <a href="/leituras/{{ leitura.id }}">Cancelar</a>
</form>

<script>
document.getElementById('form-editar').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const dados = {
    temperatura: parseFloat(form.temperatura.value),
    umidade: parseFloat(form.umidade.value),
  };
  const pressao = form.pressao.value;
  if (pressao !== '') dados.pressao = parseFloat(pressao);

  const resp = await fetch('/leituras/{{ leitura.id }}', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(dados),
  });

  if (resp.ok) window.location.href = '/leituras/{{ leitura.id }}';
  else {
    const err = await resp.json();
    alert('Erro: ' + err.erro);
  }
});
</script>
{% endblock %}
